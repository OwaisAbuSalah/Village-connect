;=============================================================
; VillageConnect - Asterisk Dialplan Configuration
; File: /etc/asterisk/extensions.conf
;=============================================================

[general]
static=yes
writeprotect=no
autofallthrough=yes

[globals]
VILLAGE_NAME=VillageConnect

[village]
; Village Administration (1XXX)
exten => _1XXX,1,Dial(SIP/${EXTEN},30)
exten => _1XXX,n,Hangup()

; School (2XXX)
exten => _2XXX,1,Dial(SIP/${EXTEN},30)
exten => _2XXX,n,Hangup()

; Social Center / Market (3XXX)
exten => _3XXX,1,Dial(SIP/${EXTEN},30)
exten => _3XXX,n,Hangup()

; Emergency Services
exten => 911,1,Dial(SIP/911,60)
exten => 911,n,Hangup()

; Echo test
exten => *43,1,Answer()
exten => *43,n,Playback(demo-echotest)
exten => *43,n,Echo()
exten => *43,n,Hangup()

; Village Announcements
exten => 100,1,Answer()
exten => 100,n,Playback(demo-congrats)
exten => 100,n,Hangup()
