#=============================================================
# VillageConnect - Kernel network parameters
# File: /etc/sysctl.conf
# Required: disable rp_filter so inter-VLAN replies aren't dropped
#=============================================================

# Disable Reverse Path Filter
net.ipv4.conf.all.rp_filter=0
net.ipv4.conf.default.rp_filter=0
net.ipv4.conf.ens33.rp_filter=0
