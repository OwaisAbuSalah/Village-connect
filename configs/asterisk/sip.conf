;=============================================================
; VillageConnect - Asterisk SIP Configuration
; File: /etc/asterisk/sip.conf
;=============================================================

[general]
context=village
bindport=5060
bindaddr=0.0.0.0
disallow=all
allow=ulaw
allow=alaw
allow=gsm
language=en
allowguest=yes
alwaysauthreject=no
insecure=port,invite
nat=force_rport,comedia
externip=192.168.40.10
localnet=192.168.0.0/255.255.0.0

;===== Village Administration =====
[1000]
type=friend
context=village
host=dynamic
secret=village1000
callerid="Village Admin" <1000>
disallow=all
allow=ulaw
allow=alaw
qualify=yes

[1001]
type=friend
context=village
host=dynamic
secret=village1001
callerid="Village Mayor" <1001>
disallow=all
allow=ulaw
allow=alaw
qualify=yes

[1002]
type=friend
context=village
host=dynamic
secret=village1002
callerid="Village Clinic" <1002>
disallow=all
allow=ulaw
allow=alaw
qualify=yes

