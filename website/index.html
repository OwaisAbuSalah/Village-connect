<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>VillageConnect - بوابة القرية</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; padding: 20px; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 40px; text-align: center; }
header h1 { margin: 0; font-size: 2.5em; }
header p { font-size: 1.2em; margin-top: 10px; opacity: 0.9; }
.nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 30px; }
.nav a { text-decoration: none; padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center; color: #2c3e50; transition: all 0.3s; border: 2px solid transparent; }
.nav a:hover { background: #3498db; color: white; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 0 30px 30px; }
.stat { text-align: center; padding: 20px; background: #e8f4f8; border-radius: 10px; }
.stat .num { font-size: 2.5em; font-weight: bold; color: #3498db; }
footer { background: #2c3e50; color: white; padding: 20px; text-align: center; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>🏡 VillageConnect</h1>
<p>بوابة القرية الإلكترونية</p>
</header>
<div class="nav">
<a href="announcements.html">📢 الإعلانات</a>
<a href="directory.html">📞 دليل الهواتف</a>
<a href="files.html">📁 الملفات التعليمية</a>
<a href="contact.html">✉️ اتصل بنا</a>
</div>
<div class="stats">
<div class="stat"><div class="num">1000</div>نسمة</div>
<div class="stat"><div class="num">100+</div>رقم داخلي</div>
<div class="stat"><div class="num">4</div>VLANs</div>
<div class="stat"><div class="num">3</div>خدمات</div>
</div>
<footer>
<p>VillageConnect © 2026 | خدمة مجانية لأهل القرية</p>
</footer>
</div>
</body>
</html>
