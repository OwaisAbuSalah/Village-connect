#=============================================================
# VillageConnect - Samba Configuration
# File: /etc/samba/smb.conf
# (Append VillageConnect shares to default Ubuntu smb.conf)
#=============================================================

# ===== VillageConnect Shares =====

[shared]
   comment = Village Shared Library
   path = /srv/village/shared
   browseable = yes
   writable = no
   guest ok = yes
   guest only = yes
   read only = yes
   create mask = 0755
   directory mask = 0755

[uploads]
   comment = Public Upload Folder
   path = /srv/village/uploads
   browseable = yes
   writable = yes
   guest ok = yes
   guest only = yes
   create mask = 0777
   directory mask = 0777

[admin]
   comment = Village Admin Files
   path = /srv/village/admin
   browseable = yes
   writable = yes
   valid users = villageadmin
   create mask = 0770
   directory mask = 0770
